<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards using Grid</title>

    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 40px;
        }

        .cards {
            background-color: bisque;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }
    </style>
</head>

<body>
    <section class="container">
        <div class="cards">
            <h3>Araish Ahmad</h3>
            <p>BSCS Semester 6 student at COMSATS University Islamabad, Lahore Campus.</p>
        </div>

        <div class="cards">
            <h3>Currently Learning</h3>
            <p>Practicing HTML, CSS Flexbox, and Grid during a frontend internship.</p>
        </div>
    </section>
</body>

</html>
